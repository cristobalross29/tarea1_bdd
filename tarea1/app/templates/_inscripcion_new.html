{% extends "base.html" %}
{% block content %}
  <h2>Inscripcion equipo a torneo</h2>
  <p class="muted">Selecciona torneo y equipo para registrar una nueva inscripcion.</p>

  <form method="post">
    <div class="field-group">
      <label for="id_torneo">Torneo</label>
      <select name="id_torneo" id="id_torneo" required>
        <option value="">-- torneo --</option>
        {% for t in torneos %}
          <option value="{{ t.id_torneo }}" {% if selected_torneo == t.id_torneo %}selected{% endif %}>
            {{ t.nombre }} ({{ t.inscritos }}/{{ t.max_equipos }})
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="field-group">
      <label for="id_equipo">Equipo</label>
      <select name="id_equipo" id="id_equipo" required>
        <option value="">-- equipo --</option>
        {% for e in equipos %}
          <option value="{{ e.id_equipo }}" {% if selected_equipo == e.id_equipo %}selected{% endif %}>{{ e.nombre }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="field-group">
      <label for="grupo">Grupo (opcional A/B)</label>
      <input id="grupo" name="grupo" maxlength="1" value="{{ selected_grupo or '' }}">
    </div>

    <button type="submit">Inscribir</button>
  </form>
{% endblock %}
