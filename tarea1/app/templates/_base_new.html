<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tarea1 BDD</title>
  <style>
    :root {
      --bg-1: #f4f7fb;
      --bg-2: #eff6f2;
      --surface: #ffffff;
      --surface-soft: #f8fbff;
      --text: #1f2937;
      --muted: #5b6777;
      --border: #d9e3ef;
      --primary: #0f6abf;
      --primary-strong: #0a569c;
      --ok-bg: #ecfdf3;
      --ok-text: #166534;
      --err-bg: #fff1f2;
      --err-text: #b42318;
      --radius: 14px;
      --shadow: 0 16px 38px rgba(15, 34, 55, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", "Tahoma", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #dce9fb 0, transparent 42%),
        radial-gradient(circle at top right, #d6f5e9 0, transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      line-height: 1.45;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 26px 20px 40px;
    }

    .site-header {
      background: linear-gradient(130deg, #183c66, #0f6abf);
      color: #fff;
      border-radius: calc(var(--radius) + 2px);
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .site-title {
      margin: 0 0 12px;
      font-size: 1.9rem;
      letter-spacing: 0.3px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    nav a {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.26);
      transition: transform 0.18s ease, background 0.18s ease;
    }

    nav a:hover {
      background: rgba(255, 255, 255, 0.24);
      transform: translateY(-1px);
    }

    .content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.45rem;
    }

    h3 {
      margin: 20px 0 10px;
      font-size: 1.08rem;
      color: #23384d;
    }

    p,
    li,
    td,
    th,
    label {
      font-size: 0.96rem;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 10px;
      margin: 0 0 14px;
      padding: 14px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    label {
      font-weight: 600;
      color: #304256;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid #c6d5e5;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #7eb2e6;
      box-shadow: 0 0 0 3px rgba(15, 106, 191, 0.13);
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 10px;
      padding: 8px 14px;
      color: #fff;
      background: linear-gradient(130deg, var(--primary), var(--primary-strong));
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0 18px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    th,
    td {
      padding: 10px 11px;
      text-align: left;
      border-bottom: 1px solid #e4ebf3;
    }

    th {
      background: #edf4fc;
      color: #1f3b57;
      font-weight: 700;
    }

    tr:nth-child(even) td {
      background: #fafcff;
    }

    tr:hover td {
      background: #f2f8ff;
    }

    a {
      color: #0f6abf;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    ul {
      margin: 0 0 18px;
      padding-left: 20px;
    }

    .flash-stack {
      margin-bottom: 14px;
      display: grid;
      gap: 8px;
    }

    .flash {
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid;
      font-weight: 600;
    }

    .flash.ok {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: #b7ebc9;
    }

    .flash.err {
      background: var(--err-bg);
      color: var(--err-text);
      border-color: #f7c6cc;
    }

    .muted {
      color: var(--muted);
      margin-top: -6px;
      margin-bottom: 12px;
    }

    .field-group {
      display: grid;
      gap: 4px;
    }

    @media (max-width: 780px) {
      .page {
        padding: 16px 12px 28px;
      }

      .site-header,
      .content {
        padding: 16px;
      }

      form {
        padding: 12px;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1 class="site-title">Torneo Gaming</h1>
      <nav>
        <a href="{{ url_for('torneos') }}">Torneos</a>
        <a href="{{ url_for('estadisticas') }}">Estadisticas</a>
        <a href="{{ url_for('busqueda') }}">Busqueda</a>
        <a href="{{ url_for('sponsors') }}">Sponsors</a>
        <a href="{{ url_for('inscripcion') }}">Inscripcion</a>
      </nav>
    </header>

    {% with m = get_flashed_messages(with_categories=true) %}
      {% if m %}
        <div class="flash-stack">
          {% for c, msg in m %}
            <p class="flash {{ c }}">{{ msg }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
