{% extends 'base.html' %}{% block content %}<h2>Inscripción equipo a torneo</h2><form method='post'><label>Torneo:</label><select name='id_torneo'>{% for t in torneos %}<option value='{{t.id_torneo}}'>{{t.nombre}}</option>{% endfor %}</select><label>Equipo:</label><select name='id_equipo'>{% for e in equipos %}<option value='{{e.id_equipo}}'>{{e.nombre}}</option>{% endfor %}</select><label>Grupo (opcional A/B):</label><input name='grupo' maxlength='1'><button type='submit'>Inscribir</button></form>{% endblock %}
