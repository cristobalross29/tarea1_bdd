{% extends "base.html" %}
{% block content %}
  <h2>Sponsors por videojuego</h2>
  <p class="muted">Selecciona un juego para ver los sponsors comunes y su aporte total.</p>

  <form>
    <div class="field-group">
      <label for="videojuego">Videojuego</label>
      <select name="videojuego" id="videojuego">
        <option value="">-- videojuego --</option>
        {% for j in juegos %}
          <option value="{{ j.videojuego }}" {% if videojuego == j.videojuego %}selected{% endif %}>{{ j.videojuego }}</option>
        {% endfor %}
      </select>
    </div>
    <button>Consultar</button>
  </form>

  {% if rows %}
    <table>
      <tr>
        <th>Nombre</th>
        <th>Industria</th>
        <th>Total aporte</th>
      </tr>
      {% for r in rows %}
        <tr>
          <td>{{ r.nombre }}</td>
          <td>{{ r.industria }}</td>
          <td>{{ r.total_aporte }}</td>
        </tr>
      {% endfor %}
    </table>
  {% endif %}
{% endblock %}
