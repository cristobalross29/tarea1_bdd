<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tarea 1 - Torneo Gaming</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      nav a { margin-right: 12px; }
      table { border-collapse: collapse; width: 100%; margin: 14px 0; }
      th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
      .ok { color: green; }
      .err { color: #b00020; }
      form.inline { display: inline; }
    </style>
  </head>
  <body>
    <h1>Torneo de Gaming</h1>
    <nav>
      <a href="{{ url_for('tournaments') }}">Torneos</a>
      <a href="{{ url_for('stats_page') }}">Estadísticas</a>
      <a href="{{ url_for('search_page') }}">Búsqueda</a>
      <a href="{{ url_for('sponsors_page') }}">Sponsors</a>
      <a href="{{ url_for('register_team') }}">Inscripción</a>
    </nav>
    <hr />
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <p class="{{ 'ok' if category == 'success' else 'err' }}">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </body>
</html>
